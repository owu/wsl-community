# Mirror Sites and Data Sources Reference List
#
# When editing online-distros, refer to this list to select mirror sources.
#
# Field descriptions:
#   name     - Mirror site identifier (corresponds to sources[].mirror in online-distros)
#   base_url - Mirror site root URL
#   enabled  - Whether recommended (false means access issues, not recommended)
#   note     - Remarks (optional)
#   distros  - Distros supported by this mirror (based on distros.yaml crawl_paths)

mirrors:
  - name: "aliyun"
    base_url: "https://mirrors.aliyun.com"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux
      - openSUSE

  - name: "tsinghua"
    base_url: "https://mirrors.tuna.tsinghua.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - openSUSE

  - name: "163"
    base_url: "https://mirrors.163.com"
