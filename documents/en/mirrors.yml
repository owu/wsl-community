# ============================================================================
# LXC Images Mirror Sites
#
# These mirrors host Linux Containers (LXC) official rootfs images.
# They provide standardized RootFS files that can be directly used for WSL import.
# ============================================================================

lxc_mirrors:
  - name: "lxc-tuna"
    base_url: "https://mirrors.tuna.tsinghua.edu.cn/lxc-images"
    enabled: true
    note: "Tsinghua University LXC mirror"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan

  - name: "lxc-bfsu"
    base_url: "https://mirrors.bfsu.edu.cn/lxc-images"
