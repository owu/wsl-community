# 镜像站与数据源参考列表
#
# 编辑 online-distros 时，可参考此列表选择镜像源。
#
# 字段说明：
#   name     - 镜像站标识（对应 online-distros 中 sources[].mirror）
#   base_url - 镜像站根地址
#   enabled  - 是否建议使用（false 表示存在访问问题，不推荐）
#   note     - 备注说明（可选）
#   distros  - 该镜像站支持的发行版（基于 distros.yaml 中的 crawl_paths）

mirrors:
  - name: "aliyun"
    base_url: "https://mirrors.aliyun.com"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux
      - openSUSE

  - name: "tsinghua"
    base_url: "https://mirrors.tuna.tsinghua.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - openSUSE

  - name: "163"
    base_url: "https://mirrors.163.com"
    enabled: true
    distros:
      - Ubuntu
      - Rocky Linux
      - openSUSE

  - name: "bfsu"
    base_url: "https://mirrors.bfsu.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine

  - name: "nju"
    base_url: "https://mirrors.nju.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux

  - name: "sjtu"
    base_url: "https://mirrors.sjtug.sjtu.edu.cn"
    enabled: true
    distros:
      - openSUSE

  - name: "hit"
    base_url: "https://mirrors.hit.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine

  - name: "zju"
    base_url: "https://mirrors.zju.edu.cn"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux

  - name: "hust"
    base_url: "https://mirrors.hust.edu.cn"
    enabled: true
    distros: []

  - name: "tencent"
    base_url: "https://mirrors.cloud.tencent.com"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux

  - name: "huawei"
    base_url: "https://mirrors.huaweicloud.com"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux
      - openSUSE

  - name: "volc"
    base_url: "https://mirrors.volces.com"
    enabled: true
    distros:
      - Ubuntu
      - Alpine
      - Rocky Linux

  - name: "sohu"
    base_url: "https://mirrors.sohu.com"
    enabled: true
    distros: []

# ============================================================================
# LXC Images 镜像站
#
# 这些镜像站托管 Linux Containers (LXC) 官方的 rootfs 镜像。
# 提供标准化的 RootFS 文件，可直接用于 WSL 的 wsl --import 命令。
# ============================================================================

lxc_mirrors:
  - name: "lxc-tuna"
    base_url: "https://mirrors.tuna.tsinghua.edu.cn/lxc-images"
    enabled: true
    note: "清华大学 LXC 镜像"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan

  - name: "lxc-bfsu"
    base_url: "https://mirrors.bfsu.edu.cn/lxc-images"
    enabled: true
    note: "北京外国语大学 LXC 镜像"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan

  - name: "lxc-nju"
    base_url: "https://mirrors.nju.edu.cn/lxc-images"
    enabled: true
    note: "南京大学 LXC 镜像"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan

  - name: "lxc-tencent"
    base_url: "https://mirrors.cloud.tencent.com/lxc-images"
    enabled: true
    note: "腾讯云 LXC 镜像"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan

  - name: "lxc-huawei"
    base_url: "https://mirrors.huaweicloud.com/lxc-images"
    enabled: true
    note: "华为云 LXC 镜像"
    distros:
      - Debian
      - Ubuntu
      - Alpine
      - Devuan
